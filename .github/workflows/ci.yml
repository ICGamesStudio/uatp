name: CI

on:
  push:
  pull_request:

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - working-directory: packages/parser-js
        run: npm ci
      - working-directory: packages/parser-js
        run: npm test
      - working-directory: packages/parser-js
        run: npm run validate:library

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - working-directory: packages/parser-python
        run: python -m pip install -e ".[dev]"
      - working-directory: packages/parser-python
        run: python -m pytest
